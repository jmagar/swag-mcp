services:
  swag-mcp:
    # Build locally (uncomment to build from source)
    build:
      context: .
      dockerfile: Dockerfile

    # Use pre-built image from GitHub Container Registry
    # image: ghcr.io/jmagar/swag-mcp:latest

    container_name: swag-mcp
    restart: unless-stopped

    # Volume mounts
    volumes:
      # Single mount for all SWAG access (proxy-confs and logs)
      # Not needed when using SWAG_MCP_PROXY_CONFS_URI for remote SSH access
      - /mnt/appdata/swag:/swag
      # Persistent storage for MCP server logs
      - ${SWAG_MCP_LOG_DIRECTORY}:/app/.swag-mcp/logs
      # Docker socket for container API access
      - /var/run/docker.sock:/var/run/docker.sock
      # SSH keys for remote SWAG server access (optional)
      # Uncomment if using SWAG_MCP_PROXY_CONFS_URI with SSH
      # - ~/.ssh:/root/.ssh:ro

    # Docker group access for socket permissions
    group_add:
      - ${DOCKER_GID:-999}  # Docker group ID (default 999)

    # Network configuration
    ports:
      - "${SWAG_MCP_PORT}:8000"  # Map to container port 8000

    # Environment variables
    environment:
      # Default settings
      - SWAG_MCP_DEFAULT_AUTH_METHOD=${SWAG_MCP_DEFAULT_AUTH_METHOD}
      - SWAG_MCP_DEFAULT_QUIC_ENABLED=${SWAG_MCP_DEFAULT_QUIC_ENABLED}

      # Backup settings
      - SWAG_MCP_BACKUP_RETENTION_DAYS=${SWAG_MCP_BACKUP_RETENTION_DAYS}

      # MCP Server settings
      - SWAG_MCP_HOST=${SWAG_MCP_HOST}

      # Remote SWAG server (optional - for SSH access)
      # - SWAG_MCP_PROXY_CONFS_URI=${SWAG_MCP_PROXY_CONFS_URI}
      # - SWAG_MCP_SWAG_LOG_BASE_PATH=${SWAG_MCP_SWAG_LOG_BASE_PATH}

      # Logging
      - SWAG_MCP_LOG_LEVEL=${SWAG_MCP_LOG_LEVEL}

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s


networks:
  default:
    name: swag-mcp-network
