networks:
  jakenet:
    name: ${DOCKER_NETWORK:-swag-mcp}
    external: true

services:
  swag-mcp:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: swag-mcp
    restart: unless-stopped

    user: "${PUID:-1000}:${PGID:-1000}"

    volumes:
      - ${SWAG_MCP_LOG_DIRECTORY:-/tmp/swag-mcp/logs}:/app/.swag-mcp/logs
      - ~/.ssh:/home/swagmcp/.ssh:ro

    ports:
      - "${SWAG_MCP_PORT:-8000}:8000"

    env_file:
      - path: ~/.claude-homelab/.env
        required: false

    networks:
      - jakenet

    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1"

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
