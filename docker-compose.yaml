# External network must exist before running docker compose up.
# Create it with: docker network create mcp-net
# Or set DOCKER_NETWORK to an existing network name.
networks:
  mcp-net:
    name: ${DOCKER_NETWORK:-mcp-net}
    external: true

services:
  swag-mcp:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: swag-mcp
    restart: unless-stopped

    user: "${PUID:-1000}:${PGID:-1000}"

    volumes:
      - /mnt/appdata/swag:/swag
      - ${SWAG_MCP_LOG_DIRECTORY:-/tmp/swag-mcp/logs}:/app/.swag-mcp/logs
      - /var/run/docker.sock:/var/run/docker.sock

    group_add:
      - ${DOCKER_GID:-999}

    ports:
      - "${SWAG_MCP_PORT:-8000}:8000"

    env_file:
      - path: .env
        required: false

    networks:
      - mcp-net

    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: "1"

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
