repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: debug-statements

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      # Run the linter
      - id: ruff
        args: [--fix]
      # Run the formatter
      - id: ruff-format

  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: uv run ty check swag_mcp/
        language: system
        types: [python]
        pass_filenames: false
        files: ^swag_mcp/
      - id: skills-validate
        name: Validate skills
        entry: just validate-skills
        language: system
        pass_filenames: false
      - id: docker-security
        name: Docker security check
        entry: bash scripts/check-docker-security.sh
        language: system
        pass_filenames: false
      - id: no-baked-env
        name: No baked env vars
        entry: bash scripts/check-no-baked-env.sh
        language: system
        pass_filenames: false
      - id: ensure-ignore-files
        name: Ensure ignore files
        entry: bash scripts/ensure-ignore-files.sh --check
        language: system
        pass_filenames: false
