## Version 2026/03/30
# OAuth 2.1 / MCP Auth include for SWAG nginx
# Include this in MCP server blocks to add OAuth protection and discovery endpoints.
#
# Requires: mcp-oauth container accessible as http://mcp-oauth:8000
# See: https://mcp-auth.tootie.tv

# OAuth 2.1 token verification (internal only — used by auth_request)
location = /_oauth_verify {
    internal;
    include /config/nginx/resolver.conf;

    proxy_pass http://mcp-oauth:8000/verify;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header X-Original-Method $request_method;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Authorization $http_authorization;
}

# OAuth 2.0 Protected Resource Metadata (RFC 9728)
# Static response — uses $server_name so it works for any domain including this file
location = /.well-known/oauth-protected-resource {
    default_type application/json;
    add_header Cache-Control "public, max-age=3600" always;
    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    return 200 '{"resource":"https://$server_name","authorization_servers":["https://mcp-auth.tootie.tv"],"scopes_supported":["mcp:read","mcp:write"],"bearer_methods_supported":["header"]}';
}

# Path-based PRM discovery (RFC 9728 — e.g. /.well-known/oauth-protected-resource/mcp)
location ~ ^/.well-known/oauth-protected-resource/.+ {
    default_type application/json;
    add_header Cache-Control "public, max-age=3600" always;
    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
    return 200 '{"resource":"https://$server_name","authorization_servers":["https://mcp-auth.tootie.tv"],"scopes_supported":["mcp:read","mcp:write"],"bearer_methods_supported":["header"]}';
}

# OAuth Authorization Server Metadata (RFC 8414)
location = /.well-known/oauth-authorization-server {
    include /config/nginx/resolver.conf;
    include /config/nginx/proxy.conf;
    add_header Cache-Control "public, max-age=3600" always;
    proxy_pass http://mcp-oauth:8000;
}

# OpenID Connect Discovery
location = /.well-known/openid-configuration {
    include /config/nginx/resolver.conf;
    include /config/nginx/proxy.conf;
    add_header Cache-Control "public, max-age=3600" always;
    proxy_pass http://mcp-oauth:8000;
}

# JWKS endpoint
location = /jwks {
    include /config/nginx/resolver.conf;
    include /config/nginx/proxy.conf;
    add_header Cache-Control "public, max-age=3600" always;
    proxy_pass http://mcp-oauth:8000;
}

# OAuth 2.0 Dynamic Client Registration (RFC 7591)
location = /register {
    include /config/nginx/resolver.conf;
    include /config/nginx/proxy.conf;
    add_header Cache-Control "no-store" always;
    proxy_pass http://mcp-oauth:8000;
}

# OAuth 2.1 Authorization Endpoint
location = /authorize {
    include /config/nginx/resolver.conf;
    include /config/nginx/proxy.conf;
    proxy_pass http://mcp-oauth:8000;
}

# OAuth 2.1 Token Endpoint
location = /token {
    include /config/nginx/resolver.conf;
    include /config/nginx/proxy.conf;
    add_header Cache-Control "no-store" always;
    proxy_pass http://mcp-oauth:8000;
}

# OAuth 2.1 Token Revocation (RFC 7009)
location = /revoke {
    include /config/nginx/resolver.conf;
    include /config/nginx/proxy.conf;
    add_header Cache-Control "no-store" always;
    proxy_pass http://mcp-oauth:8000;
}

# OAuth callback
location = /callback {
    include /config/nginx/resolver.conf;
    include /config/nginx/proxy.conf;
    proxy_pass http://mcp-oauth:8000;
}

# OAuth success page
location = /success {
    include /config/nginx/resolver.conf;
    include /config/nginx/proxy.conf;
    proxy_pass http://mcp-oauth:8000;
}

# JSON error responses for MCP clients
error_page 400 @error_400;
error_page 401 @error_401;
error_page 403 @error_403;

location @error_400 {
    internal;
    add_header Content-Type "application/json" always;
    return 400 '{"error":"bad_request","message":"Invalid request format or missing required headers"}';
}

location @error_401 {
    internal;
    add_header Content-Type "application/json" always;
    add_header WWW-Authenticate 'Bearer resource_metadata="https://$server_name/.well-known/oauth-protected-resource", scope="mcp:read mcp:write"' always;
    return 401 '{"error":"unauthorized","message":"Valid authorization token required","authorization_server":"https://$server_name/.well-known/oauth-authorization-server"}';
}

location @error_403 {
    internal;
    add_header Content-Type "application/json" always;
    return 403 '{"error":"forbidden","message":"Insufficient permissions or origin not allowed"}';
}
