## Version 2026/03/30
# MCP 2025-11-25 Streamable-HTTP overrides for SWAG nginx
# Include AFTER proxy.conf in location blocks that proxy to MCP servers.
#
# Overrides proxy.conf buffering and Connection for SSE streaming.
# Adds MCP protocol headers, CORS, OPTIONS preflight, cache-control.
#
# See: https://modelcontextprotocol.io/specification/2025-11-25/basic/transports

# Override proxy.conf buffering for SSE/streaming
proxy_buffering off;
proxy_cache off;
proxy_request_buffering off;

# Override proxy.conf Connection for SSE (not websocket upgrade)
proxy_set_header Connection '';

# MCP 2025-11-25: protocol and session headers
proxy_set_header MCP-Protocol-Version $http_mcp_protocol_version;
proxy_set_header Mcp-Session-Id $http_mcp_session_id;
proxy_set_header Accept $http_accept;
proxy_set_header Last-Event-ID $http_last_event_id;

# Strip Authorization — already validated by /_oauth_verify
proxy_set_header Authorization "";

# Streaming cache control
add_header Cache-Control "no-cache, no-store, must-revalidate" always;
add_header Pragma "no-cache" always;
add_header Expires "0" always;

# CORS headers
add_header Access-Control-Allow-Origin $http_origin always;
add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;
add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, MCP-Protocol-Version, Mcp-Session-Id, Last-Event-ID" always;
add_header Access-Control-Allow-Credentials "true" always;
add_header Access-Control-Max-Age "3600" always;

# CORS preflight
if ($request_method = 'OPTIONS') {
    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, MCP-Protocol-Version, Mcp-Session-Id, Last-Event-ID" always;
    add_header Access-Control-Allow-Credentials "true" always;
    add_header Access-Control-Max-Age "3600" always;
    add_header Content-Type "text/plain charset=UTF-8";
    add_header Content-Length 0;
    return 204;
}
